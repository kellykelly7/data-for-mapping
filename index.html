    <div id = 'map' class = 'map-container'>
        <!-- Search container -->
        <div class = 'map-search-container' id = 'map-search-container'>
            <div class = 'geocoder' id = 'geocoder'></div>
        </div>
        <button type = 'button' class = 'btn btn-primary' id = 'returnbutton'>Clear Filters and Return to Full Extent</button>
    </div>

    <div class='description' id='description-container'>
        <h2>Welcome to the USI Project Database!</h2>
        <ul>
            <li>Click on a point to view project information.</li>
            <li>Search or filter for relevant project information.</li>
            <li>Search and filter can be combined for result precision.</li>
        </ul>
    </div>

    <div class = 'project_number_search' id = 'project_number_search'>
        <label for = 'project_number'><h3>Search by Project Number</h3></label>
        <input type = 'text' class = 'project_number_input' name = 'project_number' id = 'project_number' placeholder = 'Enter exact project number'>
    </div>

    <div class = 'project_SY_search' id = 'project_SY_search'>
        <label for = 'project_start_year'><h3>Search by Project Start Year</h3></label>
        <input type = 'text' class = 'project_SY_input' name = 'project_SY' id = 'project_SY' placeholder = 'Enter Project Start Year (e.g., 2023)'>
    </div>

    <div class = 'project_EY_search' id = 'project_EY_search'>
        <label for = 'project_end_year'><h3>Search by Project End Year</h3></label>
        <input type = 'text' class = 'project_EY_input' name = 'project_EY' id = 'project_EY' placeholder = 'Enter Project End Year (e.g., 2023)'>
    </div>

    <div class = 'client_name_search' id = 'client_name_search'>
        <label for = 'client_name'><h3>Search by Client Name</h3></label>
        <input type = 'text' class = 'client_searchbar' name = 'client_name' id = 'client_name' placeholder = 'Enter exact client name' list = 'clientNames'>
        <datalist id = 'clientNames'>
            <!-- Populated dynamically from GeoJSON data -->
        </datalist>
    </div>
    
    <div class = 'proj_type_dropdown' id = 'proj_type_dropdown'>
        <label for = 'proj_type'><h3>Filter by Project Type</h3></label>
        <select class = 'form-select' id = 'proj_type'>
            <option value = '' disabled selected>Select project type</option>
            <option value = 'All'>All</option>
            <option value = 'Master Planning'>Master Planning</option>
            <option value = 'Development Approvals'>Development Approvals</option>
            <option value = 'Community Engagement'>Community Engagement</option>
            <option value = 'Due Diligence Study'>Due Diligence Study</option>
            <option value = 'Planning Analysis'>Planning Analysis</option>
            <option value = 'Transit-Oriented Development'>Transit-Oriented Development</option>
            <option value = 'Urban Design'>Urban Design</option>
            <option value = 'N/A'>N/A</option>
        </select>
    </div>
