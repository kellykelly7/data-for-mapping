    <div class="project_submission">
        <h1>New Project Submission</h1>
        <form action="/submit_project" method="post">
            <label for="project_name">Project Name:</label><br>
            <input type="text" id="project_name" name="project_name" required><br><br>

            <label for="location">Location:</label><br>
            <input type="text" id="location" name="location" required><br><br>

            <label><b>Project Type</b></label><br>
            <input type="checkbox" id="master_planning" name="master_planning" value="Master Planning">
            <label for="master_planning">Master Planning</label><br>
            <input type="checkbox" id="urban_design" name="urban_design" value="Urban Design">
            <label for="urban_design">Urban Design</label><br>
            <input type="checkbox" id="dev_approvals" name="dev_approvals" value="Development Approvals">
            <label for="dev_approvals">Development Approvals</label><br>
            <input type="checkbox" id="comm_engagement" name="comm_engagement" value="Community Engagement">
            <label for="comm_engagement">Community Engagement</label><br>
            <input type="checkbox" id="due_dil_study" name="due_dil_study" value="Due Diligence Study">
            <label for="due_dil_study">Due Diligence Study</label><br>
            <input type="checkbox" id="planning_analysis" name="planning_analysis" value="Planning Analysis">
            <label for="planning_analysis">Planning Analysis</label><br>         
            <input type="checkbox" id="TOD" name="TOD" value="Transit-Oriented Development">
            <label for="TOD">Transit-Oriented Development</label><br>
            <input type="checkbox" id="not_available" name="not_available" value="N/A">
            <label for="not_available">N/A</label><br>   

            <br>
            <label for="client_name">Client Name:</label><br>
            <input type="text" id="client_name" name="client_name" required><br><br>

            

            <label for="team_members">Team Members (comma-separated):</label><br>
            <input type="text" id="team_members" name="team_members" required><br><br>

            

            <input type="submit" value="Submit Project">
        </form>
    </div>
